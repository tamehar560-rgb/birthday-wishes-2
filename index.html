<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Wishes</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div id="countdown">

<h1>3</h1>

</div>

<div id="logo">

<img src="logo.png" alt="Logo">

</div>

<div id="birthday">

<h1>🎉 Happy Birthday 🎉</h1>

<h2>Talha</h2>
<div class="cake">
    <img src="cake.png" alt="Birthday Cake">
</div>
<button onclick="showWish()">Click Here</button>
<button id="wishBtn">
    💌 Open Birthday Wish
</button>

<div id="hiddenMessage">
    <h3>Happy Birthday Talha ❤️</h3>

    <p>
        May Allah bless you with happiness, success,
        good health, peace, and countless beautiful
        moments. May all your dreams come true.
        Have a wonderful birthday! 🎂🎉🤲
    </p>
</div>
<div id="balloons">

<div class="balloon red"></div>

<div class="balloon blue"></div>

<div class="balloon yellow"></div>

<div class="balloon green"></div>

<div class="balloon pink"></div>

<div class="balloon purple"></div>

</div>
  <audio id="birthdayMusic" loop>
    <source src="birthday.mp3" type="audio/mpeg">
  </audio>
</div>
<button onclick="playMusic()">🎵 Play Birthday Song</button>
</div>
<script src="script.js"></script>
</body>

</html>
